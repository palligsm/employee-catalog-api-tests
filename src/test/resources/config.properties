# ---------------------------------------------------------------------------
# Configuration for the Employee Catalog Management API test suite.
#
# Any value here can be overridden at runtime via a JVM system property, e.g.
#   mvn test -Dbase.uri=http://localhost:3000
# ---------------------------------------------------------------------------

# Base URL of the API under test (no trailing slash).
base.uri=https://apisforemployeecatalogmanagementsystem.onrender.com

# HR administrator credentials supplied with the exercise.
admin.username=admin1
admin.password=securePassword

# ---------------------------------------------------------------------------
# Negative-login credential fixtures (used by LoginTests).
# Each key name describes exactly what the pair is testing. Every one of these
# MUST be rejected by POST /hr/login (no token issued).
#
# Notes:
#  * An empty value (nothing after '=') represents an EMPTY STRING "".
#  * A .properties file cannot store a real null, so the NULL cases are passed
#    directly in code (see LoginTests); they are not defined here.
#  * A single blank space is written as the escape \u0020 because a bare
#    trailing space would be stripped when the file is parsed.
# ---------------------------------------------------------------------------

# 1) Valid username, but the password is WRONG
login.validUsername_invalidPassword.username=admin1
login.validUsername_invalidPassword.password=ThisIsNotTheRightPassword

# 2) INVALID (unknown) username, but a valid password
login.invalidUsername_validPassword.username=no-such-admin-9999
login.invalidUsername_validPassword.password=securePassword

# 3) EMPTY-STRING username, with a valid password
login.emptyUsername_validPassword.username=
login.emptyUsername_validPassword.password=securePassword

# 4a) Valid username, but an EMPTY-STRING password
login.validUsername_emptyPassword.username=admin1
login.validUsername_emptyPassword.password=

# 4b) Valid username, but a BLANK (single-space) password
login.validUsername_blankPassword.username=admin1
login.validUsername_blankPassword.password=\u0020

# The free-tier host cold-starts and can take up to ~60s on the first hit,
# and occasionally returns transient 502/503 while waking. These control the
# warm-up / retry behaviour so the suite is stable rather than flaky.
#
# Retries are time-budget based: a call that keeps getting a transient gateway
# status (502/503/504) is retried, with backoff, until this many seconds elapse.
retry.max.seconds=40
retry.backoff.millis=2500
# Total budget for the initial warm-up login while the host cold-starts.
warmup.max.seconds=120
