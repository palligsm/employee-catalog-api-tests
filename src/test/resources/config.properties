# ---------------------------------------------------------------------------
# Configuration for the Employee Catalog Management API test suite.
#
# Any value here can be overridden at runtime via a JVM system property, e.g.
#   mvn test -Dbase.uri=http://localhost:3000
# ---------------------------------------------------------------------------

# Base URL of the API under test (no trailing slash).
base.uri=https://apisforemployeecatalogmanagementsystem.onrender.com

# HR administrator credentials supplied with the exercise.
admin.username=admin1
admin.password=securePassword

# The free-tier host cold-starts and can take up to ~60s on the first hit,
# and occasionally returns transient 502/503 while waking. These control the
# warm-up / retry behaviour so the suite is stable rather than flaky.
#
# Retries are time-budget based: a call that keeps getting a transient gateway
# status (502/503/504) is retried, with backoff, until this many seconds elapse.
retry.max.seconds=40
retry.backoff.millis=2500
# Total budget for the initial warm-up login while the host cold-starts.
warmup.max.seconds=120
